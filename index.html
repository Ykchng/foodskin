const { useState, useEffect, useRef, useCallback } = React;

const STORAGE_KEY = "fet_data";
const API_KEY_STORAGE = "fet_api_key";

// ─── Utility ───────────────────────────────────────────────────────────
function generateId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
}

function formatDate(ts) {
  const d = new Date(ts);
  return d.toLocaleDateString("en-SG", { day: "numeric", month: "short", year: "numeric" });
}

function formatTime(ts) {
  const d = new Date(ts);
  return d.toLocaleTimeString("en-SG", { hour: "2-digit", minute: "2-digit" });
}

function formatDateTime(ts) {
  return `${formatDate(ts)}, ${formatTime(ts)}`;
}

function daysBetween(a, b) {
  return Math.abs(b - a) / (1000 * 60 * 60 * 24);
}

// Normalise items — old entries stored string[], new store {name,qty}[]
function normalizeItems(items) {
  if (!items || items.length === 0) return [];
  if (typeof items[0] === "string") return items.map((name) => ({ name, qty: "" }));
  return items;
}

function itemsToDisplay(items) {
  return normalizeItems(items)
    .map((i) => (i.qty ? `${i.name} (${i.qty})` : i.name))
    .join(", ");
}

function toDateTimeLocal(ts) {
  const d = new Date(ts);
  const pad = (n) => String(n).padStart(2, "0");
  return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

function fromDateTimeLocal(str) {
  const t = new Date(str).getTime();
  return isNaN(t) ? null : t;
}

// ─── Storage ───────────────────────────────────────────────────────────
function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch {}
  return { foodEntries: [], eczemaEntries: [] };
}

function saveData(data) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

function loadApiKey() {
  return localStorage.getItem(API_KEY_STORAGE) || "";
}

function saveApiKey(key) {
  localStorage.setItem(API_KEY_STORAGE, key);
}

// ─── Gemini API ────────────────────────────────────────────────────────
async function analyzeImageWithGemini(apiKey, base64Image, mimeType, mode) {
  const prompt =
    mode === "food"
      ? `You are a food identification assistant. Analyze this photo of food/drink and return a JSON object with:
{
  "items": [{"name": "nasi lemak", "qty": "1 plate"}, {"name": "teh tarik", "qty": "1 cup"}],
  "categories": ["coconut milk", "caffeine"],
  "calories": 650
}
Each item should have a specific name (e.g. "chicken wings", "steamed rice", "teh tarik") and an estimated qty/serving (e.g. "3 pieces", "1 bowl", "1 cup", "2 slices"). Use empty string for qty if unclear.
Categories should be broad food groups (e.g. "dairy", "gluten", "seafood", "fried food", "coconut milk", "eggs", "nuts", "caffeine", "alcohol", "spicy food", "processed food", "sugar").
Calories should be your best estimate of the total kcal for everything visible in the photo (a single integer).
Return ONLY the JSON, no other text.`
      : `You are a dermatology assistant. Analyze this photo of an eczema flare-up and return a JSON object with:
{
  "severity": 3,
  "description": "brief description of the condition"
}
Severity should be 1-5 where:
1 = very mild (slight redness)
2 = mild (visible redness, minor dryness)
3 = moderate (noticeable rash, some swelling)
4 = severe (intense redness, cracking, oozing)
5 = very severe (widespread, bleeding, significant skin damage)
Return ONLY the JSON, no other text.`;

  const resp = await fetch(
    `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`,
    {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        contents: [
          {
            parts: [
              { inlineData: { mimeType, data: base64Image } },
              { text: prompt },
            ],
          },
        ],
      }),
    }
  );

  if (!resp.ok) {
    const err = await resp.text();
    throw new Error(`Gemini API error: ${resp.status} ${err}`);
  }

  const data = await resp.json();
  const text = data.candidates?.[0]?.content?.parts?.[0]?.text || "";
  const cleaned = text.replace(/```json|```/g, "").trim();
  return JSON.parse(cleaned);
}

// ─── Analysis Engine ───────────────────────────────────────────────────
function computeCorrelations(data) {
  const { foodEntries, eczemaEntries } = data;
  if (eczemaEntries.length < 3 || foodEntries.length < 10) return null;

  const firstEntry = Math.min(
    ...foodEntries.map((e) => e.timestamp),
    ...eczemaEntries.map((e) => e.timestamp)
  );
  const totalDays = daysBetween(firstEntry, Date.now());
  if (totalDays < 14) return null;

  const categoryCount = {};
  const categoryBeforeFlare = {};
  foodEntries.forEach((f) => {
    (f.categories || []).forEach((cat) => {
      categoryCount[cat] = (categoryCount[cat] || 0) + 1;
    });
  });

  eczemaEntries.forEach((flare) => {
    const windowStart = flare.timestamp - 48 * 60 * 60 * 1000;
    const windowEnd = flare.timestamp - 2 * 60 * 60 * 1000;
    const foodsInWindow = foodEntries.filter(
      (f) => f.timestamp >= windowStart && f.timestamp <= windowEnd
    );
    const catsInWindow = new Set();
    foodsInWindow.forEach((f) => {
      (f.categories || []).forEach((cat) => catsInWindow.add(cat));
    });
    catsInWindow.forEach((cat) => {
      categoryBeforeFlare[cat] = (categoryBeforeFlare[cat] || 0) + 1;
    });
  });

  const totalMeals = foodEntries.length;
  const totalFlares = eczemaEntries.length;
  const results = [];

  Object.keys(categoryBeforeFlare).forEach((cat) => {
    const flareRate = categoryBeforeFlare[cat] / totalFlares;
    const baselineRate = (categoryCount[cat] || 0) / totalMeals;
    if (baselineRate > 0) {
      const riskRatio = flareRate / baselineRate;
      results.push({
        category: cat,
        riskRatio: Math.round(riskRatio * 100) / 100,
        timesBeforeFlare: categoryBeforeFlare[cat],
        totalFlares,
        totalOccurrences: categoryCount[cat] || 0,
      });
    }
  });

  results.sort((a, b) => b.riskRatio - a.riskRatio);
  return results;
}

function getSeverityTrend(eczemaEntries) {
  if (eczemaEntries.length < 2) return null;
  const sorted = [...eczemaEntries].sort((a, b) => a.timestamp - b.timestamp);
  const recent = sorted.slice(-7);
  const older = sorted.slice(0, Math.max(1, sorted.length - 7));
  const recentAvg = recent.reduce((s, e) => s + e.severity, 0) / recent.length;
  const olderAvg = older.reduce((s, e) => s + e.severity, 0) / older.length;
  return { recentAvg: Math.round(recentAvg * 10) / 10, olderAvg: Math.round(olderAvg * 10) / 10, trend: recentAvg > olderAvg ? "worsening" : recentAvg < olderAvg ? "improving" : "stable" };
}

function PhotoCapture({ onCapture, loading }) {
  const fileRef = useRef();
  const handleFile = (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      const base64 = reader.result.split(",")[1];
      onCapture(base64, file.type);
    };
    reader.readAsDataURL(file);
  };

  return (
    <div style={{ display: "flex", gap: 12 }}>
      <button onClick={() => { fileRef.current.setAttribute("capture", "environment"); fileRef.current.click(); }}
        disabled={loading}
        style={{
          flex: 1, padding: "16px 0", background: colors.accent, color: colors.bg,
          border: "none", borderRadius: 12, fontSize: 15, fontWeight: 700, cursor: "pointer",
          fontFamily: fontStack, opacity: loading ? 0.5 : 1,
        }}>
        {loading ? "Analyzing..." : "📸 Take Photo"}
      </button>
      <button onClick={() => { fileRef.current.removeAttribute("capture"); fileRef.current.click(); }}
        disabled={loading}
        style={{
          flex: 1, padding: "16px 0", background: colors.surface, color: colors.text,
          border: `1px solid ${colors.border}`, borderRadius: 12, fontSize: 15, fontWeight: 600,
          cursor: "pointer", fontFamily: fontStack, opacity: loading ? 0.5 : 1,
        }}>
        {"🖼️ Gallery"}
      </button>
      <input ref={fileRef} type="file" accept="image/*" onChange={handleFile} style={{ display: "none" }} />
    </div>
  );
}

function FoodLogScreen({ apiKey, data, setData }) {
  const [loading, setLoading] = useState(false);
  const [result, setResult] = useState(null);
  const [editItemsList, setEditItemsList] = useState([]); // [{id,name,qty}]
  const [editCats, setEditCats] = useState("");
  const [editCalories, setEditCalories] = useState("");
  const [editingTimeId, setEditingTimeId] = useState(null);
  const [timeDraft, setTimeDraft] = useState("");
  const [error, setError] = useState("");

  const handleCapture = async (base64, mimeType) => {
    setLoading(true);
    setError("");
    setResult(null);
    try {
      const res = await analyzeImageWithGemini(apiKey, base64, mimeType, "food");
      setResult(res);
      setEditItemsList(normalizeItems(res.items || []).map((i) => ({ ...i, id: generateId() })));
      setEditCats((res.categories || []).join(", "));
      setEditCalories(res.calories != null ? String(res.calories) : "");
    } catch (e) {
      setError(e.message);
    }
    setLoading(false);
  };

  const updateItem = (id, field, val) =>
    setEditItemsList((prev) => prev.map((i) => i.id === id ? { ...i, [field]: val } : i));
  const removeItem = (id) =>
    setEditItemsList((prev) => prev.filter((i) => i.id !== id));
  const addItem = () =>
    setEditItemsList((prev) => [...prev, { id: generateId(), name: "", qty: "" }]);

  const handleSave = () => {
    const cal = parseInt(editCalories, 10);
    const entry = {
      id: generateId(),
      timestamp: Date.now(),
      items: editItemsList.filter((i) => i.name.trim()).map(({ name, qty }) => ({ name: name.trim(), qty: qty.trim() })),
      categories: editCats.split(",").map((s) => s.trim()).filter(Boolean),
      calories: isNaN(cal) ? null : cal,
    };
    const updated = { ...data, foodEntries: [entry, ...data.foodEntries] };
    setData(updated);
    saveData(updated);
    setResult(null);
    setEditItemsList([]);
    setEditCats("");
    setEditCalories("");
  };

  return (
    <div style={{ padding: "20px 16px 100px", fontFamily: fontStack }}>
      <div style={{ fontSize: 24, fontWeight: 700, color: colors.text, marginBottom: 4 }}>Log Food</div>
      <div style={{ color: colors.textDim, fontSize: 13, marginBottom: 20 }}>Snap a photo of your meal or drink</div>

      <PhotoCapture onCapture={handleCapture} loading={loading} />

      {error && (
        <div style={{ marginTop: 16, padding: 14, background: "#2D1B1B", border: `1px solid ${colors.danger}`, borderRadius: 10, color: colors.danger, fontSize: 13 }}>
          {error}
        </div>
      )}

      {result && (
        <div style={{ marginTop: 20, padding: 20, background: colors.surface, borderRadius: 14, border: `1px solid ${colors.border}` }}>
          <div style={{ fontSize: 13, color: colors.accent, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.5px", marginBottom: 14 }}>AI Identified</div>

          <label style={{ fontSize: 12, color: colors.textDim, fontWeight: 600, display: "block", marginBottom: 8 }}>Food Items</label>
          {editItemsList.map((item) => (
            <div key={item.id} style={{ display: "flex", gap: 6, marginBottom: 6, alignItems: "center" }}>
              <input
                value={item.name}
                onChange={(e) => updateItem(item.id, "name", e.target.value)}
                placeholder="item name"
                style={{ flex: 1, padding: "10px 12px", background: colors.bg, border: `1px solid ${colors.border}`, borderRadius: 8, color: colors.text, fontSize: 14, fontFamily: fontStack, outline: "none" }}
              />
              <input
                value={item.qty}
                onChange={(e) => updateItem(item.id, "qty", e.target.value)}
                placeholder="qty"
                style={{ width: 80, padding: "10px 10px", background: colors.bg, border: `1px solid ${colors.border}`, borderRadius: 8, color: colors.text, fontSize: 13, fontFamily: fontStack, outline: "none" }}
              />
              <button onClick={() => removeItem(item.id)} style={{ background: "none", border: "none", color: colors.textMuted, cursor: "pointer", fontSize: 18, padding: "0 4px", lineHeight: 1 }}>×</button>
            </div>
          ))}
          <button onClick={addItem} style={{ fontSize: 12, color: colors.accentDim, background: "none", border: `1px dashed ${colors.border}`, borderRadius: 8, padding: "8px 14px", cursor: "pointer", marginBottom: 14, fontFamily: fontStack, fontWeight: 600 }}>
            + Add item
          </button>

          <label style={{ fontSize: 12, color: colors.textDim, fontWeight: 600, display: "block", marginBottom: 6 }}>Categories</label>
          <input value={editCats} onChange={(e) => setEditCats(e.target.value)}
            style={{ width: "100%", padding: "12px 14px", background: colors.bg, border: `1px solid ${colors.border}`, borderRadius: 8, color: colors.text, fontSize: 14, fontFamily: fontStack, boxSizing: "border-box", marginBottom: 14, outline: "none" }}
          />

          <label style={{ fontSize: 12, color: colors.textDim, fontWeight: 600, display: "block", marginBottom: 6 }}>Calories (kcal)</label>
          <input value={editCalories} onChange={(e) => setEditCalories(e.target.value.replace(/[^0-9]/g, ""))}
            inputMode="numeric"
            placeholder="e.g. 450"
            style={{ width: "100%", padding: "12px 14px", background: colors.bg, border: `1px solid ${colors.border}`, borderRadius: 8, color: colors.text, fontSize: 14, fontFamily: monoStack, boxSizing: "border-box", marginBottom: 16, outline: "none" }}
          />

          <button onClick={handleSave} style={{
            width: "100%", padding: "14px 0", background: colors.accent, color: colors.bg,
            border: "none", borderRadius: 10, fontSize: 15, fontWeight: 700, cursor: "pointer", fontFamily: fontStack,
          }}>
            {"✓ Save Entry"}
          </button>
        </div>
      )}

      {data.foodEntries.length > 0 && (
        <div style={{ marginTop: 28 }}>
          <div style={{ fontSize: 13, color: colors.textDim, fontWeight: 600, marginBottom: 12, textTransform: "uppercase", letterSpacing: "0.5px" }}>Recent</div>
          {data.foodEntries.slice(0, 5).map((e) => (
            <div key={e.id} style={{ padding: "14px 16px", background: colors.surface, borderRadius: 10, marginBottom: 8, border: `1px solid ${colors.border}` }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <div style={{ color: colors.text, fontSize: 14, fontWeight: 600 }}>{itemsToDisplay(e.items)}</div>
                <div style={{ display: "flex", gap: 2 }}>
                  <button onClick={() => { setEditingTimeId(e.id); setTimeDraft(toDateTimeLocal(e.timestamp)); }}
                    style={{ background: "none", border: "none", color: colors.textMuted, cursor: "pointer", fontSize: 14, padding: 4 }}>✎</button>
                  <button onClick={() => {
                    const updated = { ...data, foodEntries: data.foodEntries.filter((x) => x.id !== e.id) };
                    setData(updated);
                    saveData(updated);
                  }} style={{ background: "none", border: "none", color: colors.textMuted, cursor: "pointer", fontSize: 16, padding: 4 }}>×</button>
                </div>
              </div>
              {editingTimeId === e.id ? (
                <div style={{ marginTop: 10, display: "flex", gap: 6, alignItems: "center", flexWrap: "wrap" }}>
                  <input type="datetime-local" value={timeDraft} onChange={(ev) => setTimeDraft(ev.target.value)}
                    style={{ flex: 1, minWidth: 180, padding: "8px 10px", background: colors.bg, border: `1px solid ${colors.border}`, borderRadius: 6, color: colors.text, fontSize: 13, fontFamily: fontStack, outline: "none" }} />
                  <button onClick={() => {
                    const t = fromDateTimeLocal(timeDraft);
                    if (t) {
                      const updated = { ...data, foodEntries: data.foodEntries.map((x) => x.id === e.id ? { ...x, timestamp: t } : x) };
                      setData(updated);
                      saveData(updated);
                    }
                    setEditingTimeId(null);
                  }} style={{ padding: "8px 12px", background: colors.accent, color: colors.bg, border: "none", borderRadius: 6, fontSize: 12, fontWeight: 700, cursor: "pointer" }}>Save</button>
                  <button onClick={() => setEditingTimeId(null)}
                    style={{ padding: "8px 12px", background: colors.bg, color: colors.textDim, border: `1px solid ${colors.border}`, borderRadius: 6, fontSize: 12, fontWeight: 600, cursor: "pointer" }}>Cancel</button>
                </div>
              ) : (
                <div style={{ color: colors.textMuted, fontSize: 11, marginTop: 4, display: "flex", gap: 8 }}>
                  <span>{formatDateTime(e.timestamp)}</span>
                  {e.calories != null && <span style={{ color: colors.accentDim, fontFamily: monoStack, fontWeight: 600 }}>{e.calories} kcal</span>}
                </div>
              )}
              {e.categories.length > 0 && (
                <div style={{ display: "flex", flexWrap: "wrap", gap: 4, marginTop: 8 }}>
                  {e.categories.map((c) => (
                    <span key={c} style={{ padding: "3px 8px", background: colors.bg, borderRadius: 6, fontSize: 11, color: colors.accentDim }}>{c}</span>
                  ))}
                </div>
              )}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function EczemaLogScreen({ apiKey, data, setData }) {
  const [loading, setLoading] = useState(false);
  const [result, setResult] = useState(null);
  const [severity, setSeverity] = useState(3);
  const [bodyArea, setBodyArea] = useState("face");
  const [description, setDescription] = useState("");
  const [editingTimeId, setEditingTimeId] = useState(null);
  const [timeDraft, setTimeDraft] = useState("");
  const [error, setError] = useState("");
  const bodyAreas = ["face", "neck", "arms", "body", "legs"];

  const handleCapture = async (base64, mimeType) => {
    setLoading(true);
    setError("");
    setResult(null);
    try {
      const res = await analyzeImageWithGemini(apiKey, base64, mimeType, "eczema");
      setResult(res);
      setSeverity(res.severity || 3);
      setDescription(res.description || "");
    } catch (e) {
      setError(e.message);
    }
    setLoading(false);
  };

  const handleSave = () => {
    const entry = {
      id: generateId(),
      timestamp: Date.now(),
      severity,
      bodyArea,
      description,
    };
    const updated = { ...data, eczemaEntries: [entry, ...data.eczemaEntries] };
    setData(updated);
    saveData(updated);
    setResult(null);
    setDescription("");
  };

  const handleManualSave = () => {
    const entry = {
      id: generateId(),
      timestamp: Date.now(),
      severity,
      bodyArea,
      description: description || "Manual entry",
    };
    const updated = { ...data, eczemaEntries: [entry, ...data.eczemaEntries] };
    setData(updated);
    saveData(updated);
    setDescription("");
  };

  const severityColors = ["#6EE7B7", "#A7F3D0", "#FCD34D", "#F97316", "#EF4444"];
  const severityLabels = ["Very Mild", "Mild", "Moderate", "Severe", "Very Severe"];

  return (
    <div style={{ padding: "20px 16px 100px", fontFamily: fontStack }}>
      <div style={{ fontSize: 24, fontWeight: 700, color: colors.text, marginBottom: 4 }}>Log Eczema</div>
      <div style={{ color: colors.textDim, fontSize: 13, marginBottom: 20 }}>Photo for AI severity assessment, or log manually</div>

      <PhotoCapture onCapture={handleCapture} loading={loading} />

      {error && (
        <div style={{ marginTop: 16, padding: 14, background: "#2D1B1B", border: `1px solid ${colors.danger}`, borderRadius: 10, color: colors.danger, fontSize: 13 }}>
          {error}
        </div>
      )}

      <div style={{ marginTop: 20, padding: 20, background: colors.surface, borderRadius: 14, border: `1px solid ${colors.border}` }}>
        {result && (
          <div style={{ fontSize: 13, color: colors.accent, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.5px", marginBottom: 14 }}>AI Assessment</div>
        )}

        <label style={{ fontSize: 12, color: colors.textDim, fontWeight: 600, display: "block", marginBottom: 10 }}>Severity</label>
        <div style={{ display: "flex", gap: 8, marginBottom: 16 }}>
          {[1, 2, 3, 4, 5].map((n) => (
            <button key={n} onClick={() => setSeverity(n)} style={{
              flex: 1, padding: "10px 0", background: severity === n ? severityColors[n - 1] : colors.bg,
              color: severity === n ? colors.bg : colors.textDim, border: `1px solid ${severity === n ? severityColors[n - 1] : colors.border}`,
              borderRadius: 8, fontSize: 16, fontWeight: 700, cursor: "pointer", fontFamily: fontStack,
            }}>
              {n}
            </button>
          ))}
        </div>
        <div style={{ textAlign: "center", fontSize: 12, color: severityColors[severity - 1], fontWeight: 600, marginBottom: 16, marginTop: -8 }}>
          {severityLabels[severity - 1]}
        </div>

        <label style={{ fontSize: 12, color: colors.textDim, fontWeight: 600, display: "block", marginBottom: 10 }}>Body Area</label>
        <div style={{ display: "flex", gap: 8, marginBottom: 16, flexWrap: "wrap" }}>
          {bodyAreas.map((area) => (
            <button key={area} onClick={() => setBodyArea(area)} style={{
              padding: "8px 16px", background: bodyArea === area ? colors.accent : colors.bg,
              color: bodyArea === area ? colors.bg : colors.textDim,
              border: `1px solid ${bodyArea === area ? colors.accent : colors.border}`,
              borderRadius: 8, fontSize: 13, fontWeight: 600, cursor: "pointer", fontFamily: fontStack,
              textTransform: "capitalize",
            }}>
              {area}
            </button>
          ))}
        </div>

        <label style={{ fontSize: 12, color: colors.textDim, fontWeight: 600, display: "block", marginBottom: 6 }}>Notes</label>
        <textarea value={description} onChange={(e) => setDescription(e.target.value)}
          placeholder="Any notes about this flare-up..."
          rows={2}
          style={{ width: "100%", padding: "12px 14px", background: colors.bg, border: `1px solid ${colors.border}`, borderRadius: 8, color: colors.text, fontSize: 14, fontFamily: fontStack, boxSizing: "border-box", marginBottom: 16, outline: "none", resize: "none" }}
        />

        <button onClick={result ? handleSave : handleManualSave} style={{
          width: "100%", padding: "14px 0", background: colors.accent, color: colors.bg,
          border: "none", borderRadius: 10, fontSize: 15, fontWeight: 700, cursor: "pointer", fontFamily: fontStack,
        }}>
          {"✓ "}{result ? "Save Entry" : "Log Manually"}
        </button>
      </div>

      {data.eczemaEntries.length > 0 && (
        <div style={{ marginTop: 28 }}>
          <div style={{ fontSize: 13, color: colors.textDim, fontWeight: 600, marginBottom: 12, textTransform: "uppercase", letterSpacing: "0.5px" }}>Recent</div>
          {data.eczemaEntries.slice(0, 5).map((e) => (
            <div key={e.id} style={{ padding: "14px 16px", background: colors.surface, borderRadius: 10, marginBottom: 8, border: `1px solid ${colors.border}` }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                  <span style={{
                    width: 28, height: 28, borderRadius: 8, display: "flex", alignItems: "center", justifyContent: "center",
                    fontSize: 14, fontWeight: 700, background: severityColors[e.severity - 1], color: colors.bg,
                  }}>{e.severity}</span>
                  <div>
                    <span style={{ color: colors.text, fontSize: 14, fontWeight: 600, textTransform: "capitalize" }}>{e.bodyArea}</span>
                    <div style={{ color: colors.textMuted, fontSize: 11, marginTop: 2 }}>{formatDateTime(e.timestamp)}</div>
                  </div>
                </div>
                <div style={{ display: "flex", gap: 2 }}>
                  <button onClick={() => { setEditingTimeId(e.id); setTimeDraft(toDateTimeLocal(e.timestamp)); }}
                    style={{ background: "none", border: "none", color: colors.textMuted, cursor: "pointer", fontSize: 14, padding: 4 }}>✎</button>
                  <button onClick={() => {
                    const updated = { ...data, eczemaEntries: data.eczemaEntries.filter((x) => x.id !== e.id) };
                    setData(updated);
                    saveData(updated);
                  }} style={{ background: "none", border: "none", color: colors.textMuted, cursor: "pointer", fontSize: 16, padding: 4 }}>×</button>
                </div>
              </div>
              {editingTimeId === e.id && (
                <div style={{ marginTop: 10, display: "flex", gap: 6, alignItems: "center", flexWrap: "wrap" }}>
                  <input type="datetime-local" value={timeDraft} onChange={(ev) => setTimeDraft(ev.target.value)}
                    style={{ flex: 1, minWidth: 180, padding: "8px 10px", background: colors.bg, border: `1px solid ${colors.border}`, borderRadius: 6, color: colors.text, fontSize: 13, fontFamily: fontStack, outline: "none" }} />
                  <button onClick={() => {
                    const t = fromDateTimeLocal(timeDraft);
                    if (t) {
                      const updated = { ...data, eczemaEntries: data.eczemaEntries.map((x) => x.id === e.id ? { ...x, timestamp: t } : x) };
                      setData(updated);
                      saveData(updated);
                    }
                    setEditingTimeId(null);
                  }} style={{ padding: "8px 12px", background: colors.accent, color: colors.bg, border: "none", borderRadius: 6, fontSize: 12, fontWeight: 700, cursor: "pointer" }}>Save</button>
                  <button onClick={() => setEditingTimeId(null)}
                    style={{ padding: "8px 12px", background: colors.bg, color: colors.textDim, border: `1px solid ${colors.border}`, borderRadius: 6, fontSize: 12, fontWeight: 600, cursor: "pointer" }}>Cancel</button>
                </div>
              )}
              {e.description && <div style={{ color: colors.textDim, fontSize: 12, marginTop: 8 }}>{e.description}</div>}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function TimelineScreen({ data, setData }) {
  const [editingTimeId, setEditingTimeId] = useState(null);
  const [timeDraft, setTimeDraft] = useState("");
  const allEntries = [
    ...data.foodEntries.map((e) => ({ ...e, type: "food" })),
    ...data.eczemaEntries.map((e) => ({ ...e, type: "eczema" })),
  ].sort((a, b) => b.timestamp - a.timestamp);

  const severityColors = ["#6EE7B7", "#A7F3D0", "#FCD34D", "#F97316", "#EF4444"];

  const saveTime = (entry) => {
    const t = fromDateTimeLocal(timeDraft);
    if (!t) { setEditingTimeId(null); return; }
    const key = entry.type === "food" ? "foodEntries" : "eczemaEntries";
    const updated = { ...data, [key]: data[key].map((x) => x.id === entry.id ? { ...x, timestamp: t } : x) };
    setData(updated);
    saveData(updated);
    setEditingTimeId(null);
  };

  return (
    <div style={{ padding: "20px 16px 100px", fontFamily: fontStack }}>
      <div style={{ fontSize: 24, fontWeight: 700, color: colors.text, marginBottom: 4 }}>Timeline</div>
      <div style={{ color: colors.textDim, fontSize: 13, marginBottom: 20 }}>
        {data.foodEntries.length} meals · {data.eczemaEntries.length} flare-ups logged
      </div>

      {allEntries.length === 0 && (
        <div style={{ textAlign: "center", color: colors.textMuted, padding: 40, fontSize: 14 }}>
          No entries yet. Start logging!
        </div>
      )}

      {allEntries.map((e) => (
        <div key={e.id}>
          <div style={{
            display: "flex", gap: 12, padding: "14px 16px", background: colors.surface,
            borderRadius: 10, marginBottom: 6, border: `1px solid ${colors.border}`,
            borderLeft: `3px solid ${e.type === "food" ? colors.accent : severityColors[(e.severity || 3) - 1]}`,
          }}>
            <span style={{ fontSize: 20, marginTop: 2 }}>{e.type === "food" ? "🍽️" : "🩹"}</span>
            <div style={{ flex: 1 }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 8 }}>
                <div style={{ color: colors.text, fontSize: 14, fontWeight: 600 }}>
                  {e.type === "food" ? itemsToDisplay(e.items) : `${e.bodyArea} — severity ${e.severity}/5`}
                </div>
                <button onClick={() => { setEditingTimeId(e.id); setTimeDraft(toDateTimeLocal(e.timestamp)); }}
                  style={{ background: "none", border: "none", color: colors.textMuted, cursor: "pointer", fontSize: 13, padding: 2 }}>✎</button>
              </div>
              {editingTimeId === e.id ? (
                <div style={{ marginTop: 8, display: "flex", gap: 6, alignItems: "center", flexWrap: "wrap" }}>
                  <input type="datetime-local" value={timeDraft} onChange={(ev) => setTimeDraft(ev.target.value)}
                    style={{ flex: 1, minWidth: 160, padding: "6px 8px", background: colors.bg, border: `1px solid ${colors.border}`, borderRadius: 6, color: colors.text, fontSize: 12, fontFamily: fontStack, outline: "none" }} />
                  <button onClick={() => saveTime(e)}
                    style={{ padding: "6px 10px", background: colors.accent, color: colors.bg, border: "none", borderRadius: 6, fontSize: 11, fontWeight: 700, cursor: "pointer" }}>Save</button>
                  <button onClick={() => setEditingTimeId(null)}
                    style={{ padding: "6px 10px", background: colors.bg, color: colors.textDim, border: `1px solid ${colors.border}`, borderRadius: 6, fontSize: 11, fontWeight: 600, cursor: "pointer" }}>Cancel</button>
                </div>
              ) : (
                <div style={{ color: colors.textMuted, fontSize: 11, marginTop: 4, display: "flex", gap: 8 }}>
                  <span>{formatDateTime(e.timestamp)}</span>
                  {e.type === "food" && e.calories != null && <span style={{ color: colors.accentDim, fontFamily: monoStack, fontWeight: 600 }}>{e.calories} kcal</span>}
                </div>
              )}
              {e.type === "food" && e.categories.length > 0 && (
                <div style={{ display: "flex", flexWrap: "wrap", gap: 4, marginTop: 6 }}>
                  {e.categories.map((c) => (
                    <span key={c} style={{ padding: "2px 7px", background: colors.bg, borderRadius: 5, fontSize: 10, color: colors.accentDim }}>{c}</span>
                  ))}
                </div>
              )}
              {e.type === "eczema" && e.description && (
                <div style={{ color: colors.textDim, fontSize: 12, marginTop: 6 }}>{e.description}</div>
              )}
            </div>
          </div>
        </div>
      ))}
    </div>
  );
}

function InsightsScreen({ data }) {
  const correlations = computeCorrelations(data);
  const trend = getSeverityTrend(data.eczemaEntries);
  const totalDays = data.foodEntries.length > 0
    ? Math.max(1, daysBetween(Math.min(...data.foodEntries.map((e) => e.timestamp)), Date.now()))
    : 0;

  return (
    <div style={{ padding: "20px 16px 100px", fontFamily: fontStack }}>
      <div style={{ fontSize: 24, fontWeight: 700, color: colors.text, marginBottom: 4 }}>Insights</div>
      <div style={{ color: colors.textDim, fontSize: 13, marginBottom: 24 }}>
        Analysis updates with every new entry
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 24 }}>
        {[
          { label: "Days tracked", value: Math.round(totalDays) },
          { label: "Meals logged", value: data.foodEntries.length },
          { label: "Flare-ups", value: data.eczemaEntries.length },
          { label: "Avg/day", value: totalDays > 0 ? (data.foodEntries.length / totalDays).toFixed(1) : "—" },
          { label: "Today kcal", value: (() => {
              const start = new Date(); start.setHours(0,0,0,0);
              const sum = data.foodEntries.filter(e => e.timestamp >= start.getTime()).reduce((s,e) => s + (e.calories || 0), 0);
              return sum || "—";
            })() },
          { label: "Avg kcal/day", value: (() => {
              if (totalDays < 1) return "—";
              const total = data.foodEntries.reduce((s,e) => s + (e.calories || 0), 0);
              return total > 0 ? Math.round(total / totalDays) : "—";
            })() },
        ].map((s) => (
          <div key={s.label} style={{ padding: 16, background: colors.surface, borderRadius: 12, border: `1px solid ${colors.border}`, textAlign: "center" }}>
            <div style={{ fontSize: 24, fontWeight: 700, color: colors.accent, fontFamily: monoStack }}>{s.value}</div>
            <div style={{ fontSize: 11, color: colors.textDim, marginTop: 4 }}>{s.label}</div>
          </div>
        ))}
      </div>

      {trend && (
        <div style={{ padding: 18, background: colors.surface, borderRadius: 14, border: `1px solid ${colors.border}`, marginBottom: 16 }}>
          <div style={{ fontSize: 13, fontWeight: 700, color: colors.textDim, marginBottom: 10, textTransform: "uppercase", letterSpacing: "0.5px" }}>Severity Trend</div>
          <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
            <span style={{ fontSize: 28 }}>
              {trend.trend === "improving" ? "📉" : trend.trend === "worsening" ? "📈" : "➡️"}
            </span>
            <div>
              <div style={{ color: colors.text, fontSize: 15, fontWeight: 600, textTransform: "capitalize" }}>{trend.trend}</div>
              <div style={{ color: colors.textDim, fontSize: 12 }}>
                Recent avg: {trend.recentAvg} · Previous avg: {trend.olderAvg}
              </div>
            </div>
          </div>
        </div>
      )}

      {correlations === null ? (
        <div style={{ padding: 24, background: colors.surface, borderRadius: 14, border: `1px solid ${colors.border}`, textAlign: "center" }}>
          <div style={{ fontSize: 32, marginBottom: 12 }}>{"📊"}</div>
          <div style={{ color: colors.text, fontSize: 15, fontWeight: 600, marginBottom: 6 }}>Not enough data yet</div>
          <div style={{ color: colors.textDim, fontSize: 13, lineHeight: 1.5 }}>
            Keep logging for at least 2 weeks with 10+ meals and 3+ flare-ups to see correlations.
          </div>
        </div>
      ) : (
        <div>
          <div style={{ fontSize: 13, fontWeight: 700, color: colors.textDim, marginBottom: 12, textTransform: "uppercase", letterSpacing: "0.5px" }}>
            Potential Triggers
          </div>
          {correlations.filter((c) => c.riskRatio > 1.2).length === 0 ? (
            <div style={{ padding: 18, background: colors.surface, borderRadius: 12, border: `1px solid ${colors.border}`, color: colors.textDim, fontSize: 14 }}>
              No strong correlations found yet. Keep logging — patterns may emerge.
            </div>
          ) : (
            correlations
              .filter((c) => c.riskRatio > 1.2)
              .map((c) => (
                <div key={c.category} style={{
                  padding: "14px 16px", background: colors.surface, borderRadius: 10, marginBottom: 8,
                  border: `1px solid ${colors.border}`,
                  borderLeft: `3px solid ${c.riskRatio > 2 ? colors.danger : c.riskRatio > 1.5 ? colors.warning : colors.accentDim}`,
                }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                    <span style={{ color: colors.text, fontSize: 14, fontWeight: 600, textTransform: "capitalize" }}>{c.category}</span>
                    <span style={{
                      padding: "3px 10px", borderRadius: 6, fontSize: 12, fontWeight: 700, fontFamily: monoStack,
                      background: c.riskRatio > 2 ? "#2D1B1B" : c.riskRatio > 1.5 ? "#2D2516" : colors.bg,
                      color: c.riskRatio > 2 ? colors.danger : c.riskRatio > 1.5 ? colors.warning : colors.accentDim,
                    }}>
                      {c.riskRatio}x risk
                    </span>
                  </div>
                  <div style={{ color: colors.textMuted, fontSize: 11, marginTop: 6 }}>
                    Found before {c.timesBeforeFlare} of {c.totalFlares} flare-ups · eaten {c.totalOccurrences} times total
                  </div>
                </div>
              ))
          )}

          {correlations.filter((c) => c.riskRatio <= 1.2).length > 0 && (
            <div style={{ marginTop: 16 }}>
              <div style={{ fontSize: 13, fontWeight: 700, color: colors.textDim, marginBottom: 12, textTransform: "uppercase", letterSpacing: "0.5px" }}>
                Likely Safe
              </div>
              {correlations.filter((c) => c.riskRatio <= 1.2).slice(0, 5).map((c) => (
                <div key={c.category} style={{
                  padding: "10px 16px", background: colors.surface, borderRadius: 10, marginBottom: 6,
                  border: `1px solid ${colors.border}`, display: "flex", justifyContent: "space-between", alignItems: "center",
                }}>
                  <span style={{ color: colors.textDim, fontSize: 13, textTransform: "capitalize" }}>{c.category}</span>
                  <span style={{ color: colors.textMuted, fontSize: 12, fontFamily: monoStack }}>{c.riskRatio}x</span>
                </div>
              ))}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

function SettingsScreen({ onClearKey }) {
  const [confirmClear, setConfirmClear] = useState(false);
  const data = loadData();

  const handleExport = () => {
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `foodskin-export-${new Date().toISOString().slice(0, 10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
  };

  const handleImport = (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const imported = JSON.parse(reader.result);
        if (imported.foodEntries && imported.eczemaEntries) {
          saveData(imported);
          window.location.reload();
        }
      } catch {}
    };
    reader.readAsText(file);
  };

  const handleClearData = () => {
    if (!confirmClear) { setConfirmClear(true); return; }
    saveData({ foodEntries: [], eczemaEntries: [] });
    window.location.reload();
  };

  return (
    <div style={{ padding: "20px 16px 100px", fontFamily: fontStack }}>
      <div style={{ fontSize: 24, fontWeight: 700, color: colors.text, marginBottom: 24 }}>Settings</div>

      <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
        <button onClick={handleExport} style={{
          padding: "16px 20px", background: colors.surface, border: `1px solid ${colors.border}`,
          borderRadius: 12, color: colors.text, fontSize: 14, fontWeight: 600, cursor: "pointer",
          textAlign: "left", fontFamily: fontStack,
        }}>
          {"📤 Export Data (JSON)"}
        </button>

        <label style={{
          padding: "16px 20px", background: colors.surface, border: `1px solid ${colors.border}`,
          borderRadius: 12, color: colors.text, fontSize: 14, fontWeight: 600, cursor: "pointer",
          fontFamily: fontStack,
        }}>
          {"📥 Import Data"}
          <input type="file" accept=".json" onChange={handleImport} style={{ display: "none" }} />
        </label>

        <button onClick={() => onClearKey()} style={{
          padding: "16px 20px", background: colors.surface, border: `1px solid ${colors.border}`,
          borderRadius: 12, color: colors.warning, fontSize: 14, fontWeight: 600, cursor: "pointer",
          textAlign: "left", fontFamily: fontStack,
        }}>
          {"🔑 Change API Key"}
        </button>

        <button onClick={handleClearData} style={{
          padding: "16px 20px", background: confirmClear ? "#2D1B1B" : colors.surface,
          border: `1px solid ${confirmClear ? colors.danger : colors.border}`,
          borderRadius: 12, color: colors.danger, fontSize: 14, fontWeight: 600, cursor: "pointer",
          textAlign: "left", fontFamily: fontStack,
        }}>
          {confirmClear ? "⚠️ Tap again to confirm delete" : "🗑️ Clear All Data"}
        </button>
      </div>

      <div style={{ marginTop: 32, color: colors.textMuted, fontSize: 11, lineHeight: 1.6, textAlign: "center" }}>
        FoodSkin v1.0 · All data stored locally on your device
        <br />Photos are sent to Gemini API for analysis only — not stored.
      </div>
    </div>
  );
}

// ─── App ───────────────────────────────────────────────────────────────
function App() {
  const [apiKey, setApiKey] = useState(loadApiKey);
  const [tab, setTab] = useState("food");
  const [data, setData] = useState(loadData);

  const handleSetupDone = (key) => {
    saveApiKey(key);
    setApiKey(key);
  };

  const handleClearKey = () => {
    localStorage.removeItem(API_KEY_STORAGE);
    setApiKey("");
  };

  if (!apiKey) return <SetupScreen onSave={handleSetupDone} />;

  return (
    <div style={{ background: colors.bg, minHeight: "100vh" }}>
      <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
      {tab === "food" && <FoodLogScreen apiKey={apiKey} data={data} setData={setData} />}
      {tab === "eczema" && <EczemaLogScreen apiKey={apiKey} data={data} setData={setData} />}
      {tab === "timeline" && <TimelineScreen data={data} setData={setData} />}
      {tab === "insights" && <InsightsScreen data={data} />}
      {tab === "settings" && <SettingsScreen onClearKey={handleClearKey} />}
      <BottomNav tab={tab} setTab={setTab} />
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
